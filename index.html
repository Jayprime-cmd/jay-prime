  <head>

    <title>Jay Prime</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #0a0a0a, #000);
      color: white;
    }

    header {
      text-align: center;
      padding: 70px 20px;
    }

    h1 {
  font-size: 60px;
  color: #00f7ff;
  letter-spacing: 4px;
  animation: glow 2s infinite alternate;
}

/* glowing pulse effect */
@keyframes glow {
  0% {
    text-shadow: 0 0 10px #00f7ff;
    transform: translateY(0px);
  }

  100% {
    text-shadow: 0 0 30px #00f7ff, 0 0 60px #00f7ff;
    transform: translateY(-5px);
  }
}

    .tagline {
      color: #aaa;
      margin-top: 10px;
      font-size: 18px;
    }

    nav {
      text-align: center;
      margin: 20px 0;
    }

    nav a {
      color: #00f7ff;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }

    nav a:hover {
      text-shadow: 0 0 10px #00f7ff;
    }

    .container {
  width: 90%;
  max-width: 900px;
  margin: auto;
}

    .post {
      background: #111;
      padding: 20px;
      margin: 20px 0;
      border-left: 4px solid #00f7ff;
      box-shadow: 0 0 15px rgba(0,247,255,0.1);
      border-radius: 10px;
    }

    footer {
      text-align: center;
      padding: 40px;
      color: #555;
      font-size: 14px;
    }
  </style>
</head>
